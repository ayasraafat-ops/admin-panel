<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Bot v9</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',sans-serif;
  background:#0a0e1a;color:#f1f5f9;
  min-height:100vh;padding:1.2rem;
  display:flex;flex-direction:column;align-items:center;
  background-image:radial-gradient(at 20% 50%,rgba(99,102,241,.06),transparent 50%)
}
h1{
  font-size:1.8rem;text-align:center;margin-bottom:.2rem;
  background:linear-gradient(135deg,#6366f1,#a78bfa,#22c55e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.sub{color:#94a3b8;text-align:center;font-size:.85rem;margin-bottom:.4rem}
.tag{text-align:center;font-size:.72rem;padding:.25rem .7rem;border-radius:50px;
  display:inline-block;background:rgba(0,0,0,.3);margin-bottom:1rem;
  border:1px solid {{PW_COLOR}}40;color:{{PW_COLOR}}}
.ctr{display:flex;justify-content:center;margin-bottom:.5rem}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:1100px}
@media(max-width:850px){.grid{grid-template-columns:1fr}}

/* Card */
.card{background:rgba(17,24,39,.8);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;padding:1.2rem;backdrop-filter:blur(10px)}
.ct{font-size:.88rem;font-weight:600;margin-bottom:.9rem}

/* Fields */
.f{margin-bottom:.75rem}
.f label{display:block;font-size:.74rem;color:#94a3b8;margin-bottom:.2rem}
.f input,.f textarea,.f select{
  width:100%;padding:.55rem .7rem;background:#111827;
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  color:#f1f5f9;font-size:.82rem;outline:none;font-family:inherit}
.f input:focus,.f textarea:focus{border-color:#6366f1;box-shadow:0 0 0 2px rgba(99,102,241,.1)}
.f textarea{resize:vertical;min-height:50px;font-size:.75rem}

/* Toggles */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.ti{display:flex;align-items:center;justify-content:space-between;
  padding:.45rem .65rem;background:#111827;border:1px solid rgba(255,255,255,.08);
  border-radius:8px;cursor:pointer}
.ti .lb{font-size:.76rem;color:#94a3b8}
.sw{position:relative;width:36px;height:19px;flex-shrink:0}
.sw input{display:none}
.sw i{position:absolute;inset:0;background:#334155;border-radius:50px;cursor:pointer;
  font-style:normal;transition:.3s}
.sw i::before{content:'';position:absolute;width:13px;height:13px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+i{background:#6366f1}
.sw input:checked+i::before{transform:translateX(17px)}

/* Buttons */
.btn{width:100%;padding:.65rem;border:none;border-radius:8px;font-size:.9rem;
  font-weight:600;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,#6366f1,#4f46e5);margin-top:.3rem}
.btn:hover:not(:disabled){opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stop{width:100%;padding:.5rem;border:1px solid #ef4444;border-radius:8px;
  background:transparent;color:#ef4444;font-size:.8rem;cursor:pointer;
  margin-top:.3rem;display:none}

/* Progress */
.prg{margin-bottom:.7rem;display:none}
.prg.on{display:block}
.prg-t{display:flex;justify-content:space-between;font-size:.7rem;color:#94a3b8;margin-bottom:.2rem}
.prg-b{width:100%;height:4px;background:#111827;border-radius:50px;overflow:hidden}
.prg-f{height:100%;width:0%;background:linear-gradient(90deg,#6366f1,#22c55e);
  border-radius:50px;transition:width .4s}
.stat{font-size:.7rem;color:#64748b;margin-bottom:.5rem}

/* Screenshot */
.ss-box{margin-bottom:.8rem;display:none}
.ss-box.on{display:block}
.ss-label{font-size:.7rem;color:#94a3b8;margin-bottom:.3rem;display:flex;
  justify-content:space-between;align-items:center}
.ss-label span{color:#6366f1}
.ss-frame{width:100%;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.08);
  background:#030712;min-height:180px;display:flex;align-items:center;justify-content:center}
.ss-frame img{width:100%;height:auto;display:block}
.ss-frame .placeholder{color:#334155;font-size:.8rem}

/* Console */
.con{background:#030712;border:1px solid rgba(255,255,255,.08);border-radius:8px;
  padding:.5rem;height:220px;overflow-y:auto;font-family:Consolas,monospace;
  font-size:.72rem;line-height:1.6;direction:ltr;text-align:left}
.con::-webkit-scrollbar{width:4px}
.con::-webkit-scrollbar-thumb{background:#334155;border-radius:50px}
.l{padding:.08rem 0}
.l.info{color:#94a3b8}.l.success{color:#22c55e}.l.warn{color:#f59e0b}
.l.error{color:#ef4444}.l.ai{color:#a78bfa}
.t{color:#475569;margin-left:.3rem;font-size:.64rem}

/* Result */
.r{display:none;margin-top:.7rem;padding:.75rem;border-radius:8px;
  border:1px solid rgba(255,255,255,.08)}
.r.show{display:block}
.r.ok{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2)}
.r.bad{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2)}
.r h3{font-size:.85rem;margin-bottom:.5rem}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.ri{font-size:.7rem;color:#94a3b8;padding:.25rem .45rem;
  background:rgba(255,255,255,.02);border-radius:6px}
.ri b{display:block;color:#f1f5f9;font-size:.75rem;margin-top:.08rem;word-break:break-all}
.foot{text-align:center;margin-top:1.5rem;color:#64748b;font-size:.7rem}

/* Screenshot counter */
.ss-nav{display:flex;gap:.4rem;align-items:center}
.ss-nav button{background:#1e293b;border:1px solid rgba(255,255,255,.1);
  color:#94a3b8;padding:.15rem .4rem;border-radius:4px;cursor:pointer;font-size:.7rem}
.ss-nav button:hover{border-color:#6366f1}
</style>
</head>
<body>

<h1>&#x26A1; Ultra-Fast Login Bot</h1>
<p class="sub">HTTP + Playwright + Gemini AI + Live Screenshots</p>
<div class="ctr"><span class="tag">{{PW_TEXT}}</span></div>

<div class="grid">

<!-- LEFT -->
<div style="display:flex;flex-direction:column;gap:1rem">

<div class="card">
  <div class="ct">&#x1F510; بيانات الدخول</div>
  <div class="f"><label>الرابط</label>
    <input id="xurl" placeholder="https://example.com/login"></div>
  <div class="f"><label>المستخدم</label>
    <input id="xuser" placeholder="admin@example.com"></div>
  <div class="f"><label>كلمة المرور</label>
    <input id="xpw" type="password" placeholder="********"></div>
  <div class="f"><label>المحاولات</label>
    <select id="xret"><option>1</option><option>2</option>
    <option selected>3</option><option>5</option></select></div>
  <div class="f"><label>الطريقة</label>
    <select id="xmode">
      <option value="auto">تلقائي</option>
      <option value="http">HTTP مباشر</option>
      <option value="playwright">Playwright</option>
    </select></div>
</div>

<div class="card">
  <div class="ct">&#x2699;&#xFE0F; خيارات</div>
  <div class="tg">
    <label class="ti"><span class="lb">&#x1F916; Gemini</span>
      <div class="sw"><input type="checkbox" id="ogem" checked><i></i></div></label>
    <label class="ti"><span class="lb">&#x1F513; كابتشا</span>
      <div class="sw"><input type="checkbox" id="ocap"><i></i></div></label>
  </div>
</div>

<div class="card">
  <div class="ct">&#x1F527; API Keys</div>
  <div class="f"><label>Gemini API Key</label>
    <input id="xgk" type="password" placeholder="AIzaSy..."></div>
  <div class="f"><label>2Captcha Key</label>
    <input id="xck" type="password" placeholder="key"></div>
</div>

<button class="btn" id="bgo" onclick="go()">&#x1F680; ابدأ</button>
<button class="stop" id="bst" onclick="st()">&#x26D4; إيقاف</button>
</div>

<!-- RIGHT -->
<div style="display:flex;flex-direction:column;gap:1rem">

<!-- Progress -->
<div class="card">
  <div class="ct">&#x1F4CA; التقدم</div>
  <div class="stat" id="stat">جاهز</div>
  <div class="prg" id="prg">
    <div class="prg-t"><span id="plbl">...</span><span id="ppct">0%</span></div>
    <div class="prg-b"><div class="prg-f" id="pf"></div></div>
  </div>
  <div class="r" id="res"><h3 id="rh"></h3><div class="rg" id="rg"></div></div>
</div>

<!-- Screenshot -->
<div class="card">
  <div class="ct">&#x1F4F8; لقطات الشاشة</div>
  <div class="ss-box on" id="ssbox">
    <div class="ss-label">
      <span id="sslbl">في انتظار لقطة...</span>
      <div class="ss-nav">
        <button onclick="prevSS()">&#x25C0;</button>
        <span id="ssnum" style="font-size:.68rem;color:#64748b">0/0</span>
        <button onclick="nextSS()">&#x25B6;</button>
      </div>
    </div>
    <div class="ss-frame" id="ssframe">
      <span class="placeholder">&#x1F4F7; لقطات الشاشة ستظهر هنا</span>
    </div>
  </div>
</div>

<!-- Console -->
<div class="card" style="flex:1">
  <div class="ct">&#x1F5A5;&#xFE0F; السجل
    <span style="margin-right:auto"></span>
    <button onclick="clr()" style="background:#111827;border:1px solid rgba(255,255,255,.08);
      color:#64748b;padding:.15rem .4rem;border-radius:6px;font-size:.65rem;cursor:pointer">مسح</button>
  </div>
  <div class="con" id="con"></div>
</div>

</div>
</div>

<div class="foot">v9.0 — FastAPI + httpx + Playwright + Gemini AI + Live Screenshots</div>

<script>
var ws=null, sid=null;

// لقطات الشاشة
var screenshots = [];
var ssIndex = -1;

function G(id){return document.getElementById(id)}

function ts(){
  var d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+
         String(d.getMinutes()).padStart(2,'0')+':'+
         String(d.getSeconds()).padStart(2,'0');
}

function lg(m,v){
  var c=G('con'),d=document.createElement('div');
  d.className='l '+(v||'info');
  var s=document.createElement('span');
  s.className='t';s.textContent='['+ts()+'] ';
  d.appendChild(s);
  d.appendChild(document.createTextNode(m));
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function clr(){G('con').innerHTML='';lg('تم المسح')}

function sp(p,l){
  G('prg').classList.add('on');
  G('pf').style.width=p+'%';
  G('ppct').textContent=p+'%';
  if(l)G('plbl').textContent=l;
}

// ── لقطات الشاشة ──

function addScreenshot(img, label){
  screenshots.push({img:img, label:label, time:ts()});
  ssIndex = screenshots.length - 1;
  showScreenshot(ssIndex);
}

function showScreenshot(idx){
  if(idx < 0 || idx >= screenshots.length) return;
  ssIndex = idx;
  var ss = screenshots[idx];
  var frame = G('ssframe');
  frame.innerHTML = '<img src="'+ss.img+'" alt="screenshot">';
  G('sslbl').textContent = ss.label + ' — ' + ss.time;
  G('ssnum').textContent = (idx+1)+'/'+screenshots.length;
}

function prevSS(){
  if(ssIndex > 0) showScreenshot(ssIndex - 1);
}

function nextSS(){
  if(ssIndex < screenshots.length - 1) showScreenshot(ssIndex + 1);
}

// ── النتيجة ──

function sr(d){
  var c=G('res'),g=G('rg'),h=G('rh');
  c.className='r show '+(d.success?'ok':'bad');
  h.textContent=d.success?'نجح!':'فشل';
  h.style.color=d.success?'#22c55e':'#ef4444';
  var items=[
    ['الحالة',d.status],['الطريقة',d.method||'-'],
    ['الزمن',d.elapsed],['العنوان',d.title||'-'],
    ['الرابط',d.url_after||'-'],['الكوكيز',d.cookies_count||0],
    ['خطأ',d.error||'لا يوجد']
  ];
  var html='';
  for(var i=0;i<items.length;i++){
    html+='<div class="ri">'+items[i][0]+'<b>'+String(items[i][1])+'</b></div>';
  }
  g.innerHTML=html;
}

function ui(r){
  G('bgo').disabled=r;
  G('bst').style.display=r?'block':'none';
  G('stat').textContent=r?'جاري...':'جاهز';
}

// ── WebSocket ──

function conn(){
  sid=Date.now().toString(36)+Math.random().toString(36).substr(2,5);
  var p=(location.protocol==='https:')?'wss':'ws';
  ws=new WebSocket(p+'://'+location.host+'/ws/'+sid);

  ws.onopen=function(){lg('متصل','success')};

  ws.onmessage=function(e){
    try{
      var m=JSON.parse(e.data);
      if(m.event==='log') lg(m.data.msg, m.data.level);
      if(m.event==='progress') sp(m.data.pct, m.data.label);
      if(m.event==='screenshot') addScreenshot(m.data.img, m.data.label);
      if(m.event==='done'){
        sr(m.data);ui(false);
        lg(m.data.success?'نجح!':'فشل: '+(m.data.error||''),
           m.data.success?'success':'error');
      }
    }catch(x){}
  };

  ws.onclose=function(){lg('انقطع','warn');ui(false);setTimeout(conn,2500)};
  ws.onerror=function(){lg('خطأ','error')};
}

// ── التشغيل ──

function go(){
  var url=G('xurl').value.trim();
  var user=G('xuser').value.trim();
  var pw=G('xpw').value.trim();

  if(!url||!user||!pw){lg('املأ الحقول!','warn');return}

  // Reset
  G('res').className='r';
  sp(0,'بدء...');
  ui(true);
  screenshots=[];
  ssIndex=-1;
  G('ssframe').innerHTML='<span class="placeholder">جاري الالتقاط...</span>';
  G('ssnum').textContent='0/0';
  G('sslbl').textContent='جاري...';

  lg('================================');
  lg('بدء: '+url);

  var msg={
    action:'start',
    url:url, user:user, pw:pw,
    retries:G('xret').value,
    mode:G('xmode').value,
    use_gemini:G('ogem').checked,
    use_captcha:G('ocap').checked,
    gemini_key:G('xgk').value.trim(),
    captcha_key:G('xck').value.trim()
  };

  if(ws&&ws.readyState===1) ws.send(JSON.stringify(msg));
  else{lg('غير متصل!','error');ui(false)}
}

function st(){
  if(ws){ws.close();lg('إيقاف','warn');ui(false);setTimeout(conn,500)}
}

lg('تحميل...');
conn();
</script>
</body>
</html>
